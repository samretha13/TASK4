<!DOCTYPE html>
<html>
<head>
  <title>Quote Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>📜 Quote Generator</h1>

    <div class="quote-box">
      <p id="quote">Click button to generate quote</p>
      <h3 id="author"></h3>

      <button onclick="getQuote()">
        Generate Quote
      </button>
    </div>

    <div class="history">
      <h2>Quote History</h2>

      <ul id="historyList"></ul>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
